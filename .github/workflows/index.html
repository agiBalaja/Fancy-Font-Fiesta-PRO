<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fancy Font Fiesta – GitHub Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#6366f1', secondary: '#0ea5e9' }
        }
      }
    }
    </script>
    <style>
        /* Penting: Menggunakan font-family yang mendukung banyak simbol Unicode */
        body { 
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI Symbol", "Apple Color Emoji", sans-serif;
            transition: all 0.3s ease; 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-gray-950 min-h-screen p-4">
<div class="max-w-xl mx-auto bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-800 overflow-hidden mt-10">

<div class="p-6 space-y-6">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold flex items-center gap-2">
      <i data-feather="terminal" class="text-primary"></i> FontFiesta <span class="text-primary">PRO</span>
    </h1>
    <button id="toggleDark" class="p-3 rounded-2xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">🌙</button>
  </div>

  <div class="space-y-2">
    <textarea id="input" rows="3"
      class="w-full p-4 rounded-2xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary outline-none text-lg transition shadow-inner"
      placeholder="Ketik teks di sini..."></textarea>
  </div>

  <div class="flex flex-col sm:flex-row gap-3">
    <div class="relative flex-1">
      <input id="search" placeholder="Cari gaya..."
        class="w-full p-3 pl-10 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 outline-none focus:ring-2 focus:ring-primary/50">
      <i data-feather="search" class="absolute left-3.5 top-3.5 w-4 h-4 text-gray-400"></i>
    </div>
    <button id="copyAll"
      class="bg-primary hover:bg-indigo-600 text-white font-bold px-6 py-3 rounded-xl transition shadow-lg shadow-indigo-500/20 active:scale-95">
      Salin Semua
    </button>
  </div>

  <div id="result" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
      </div>
</div>

<div class="p-4 bg-gray-50 dark:bg-gray-800/50 text-center text-[10px] text-gray-400 uppercase tracking-widest">
    Powered by Unicode Transform Technology
</div>

</div>

<script>
feather.replace();

const input = document.getElementById("input");
const result = document.getElementById("result");
const search = document.getElementById("search");
const copyAll = document.getElementById("copyAll");
const toggleDark = document.getElementById("toggleDark");

/**
 * PENTING: Menggunakan Code Points (Hex) agar karakter tidak rusak saat hosting.
 * Ini menjamin browser memanggil karakter yang benar meskipun file dibaca di sistem berbeda.
 */
const fonts = [
  { 
    name: "Bold Serif", 
    map: (c) => {
        if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1D400 + (c.charCodeAt(0) - 65));
        if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1D41A + (c.charCodeAt(0) - 97));
        return c;
    }
  },
  { 
    name: "Script Elegant", 
    map: (c) => {
        if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1D49C + (c.charCodeAt(0) - 65));
        if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1D4B6 + (c.charCodeAt(0) - 97));
        return c;
    }
  },
  { 
    name: "Double Struck", 
    map: (c) => {
        if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1D538 + (c.charCodeAt(0) - 65));
        if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1D552 + (c.charCodeAt(0) - 97));
        return c;
    }
  },
  { 
    name: "Mono Space", 
    map: (c) => {
        if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1D670 + (c.charCodeAt(0) - 65));
        if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1D68A + (c.charCodeAt(0) - 97));
        return c;
    }
  },
  { 
    name: "Squared (Safe)", 
    map: (c) => {
        const u = c.toUpperCase();
        if (u >= 'A' && u <= 'Z') return String.fromCodePoint(0x1F130 + (u.charCodeAt(0) - 65));
        return c;
    }
  },
  { 
    name: "Circled", 
    map: (c) => {
        const u = c.toUpperCase();
        if (u >= 'A' && u <= 'Z') return String.fromCodePoint(0x24B6 + (u.charCodeAt(0) - 65));
        return c;
    }
  }
];

const decorations = [
  { name: "", apply: t => t },
  { name: " (Mirror)", apply: t => t.split('').reverse().join('') },
  { name: " (Stars)", apply: t => `★ ${t} ★` },
  { name: " (Slash)", apply: t => t.split('').join('/') }
];

function generate() {
  const text = input.value || "Halo Dunia";
  const query = search.value.toLowerCase();
  result.innerHTML = "";

  fonts.forEach(f => {
    decorations.forEach(d => {
      const label = (f.name + d.name).trim();
      if (!label.toLowerCase().includes(query)) return;

      const converted = text.split('').map(f.map).join('');
      const finalResult = d.apply(converted);

      const card = document.createElement("div");
      card.className = "p-4 rounded-2xl bg-gray-50 dark:bg-gray-800 hover:border-primary border border-transparent transition cursor-pointer group relative shadow-sm";
      card.innerHTML = `
        <div class="text-[10px] font-bold text-gray-400 group-hover:text-primary uppercase mb-1">${label}</div>
        <div class="text-xl pr-8">${finalResult}</div>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition">
            <i data-feather="copy" class="w-4 h-4 text-primary"></i>
        </div>
      `;
      
      card.onclick = () => {
        navigator.clipboard.writeText(finalResult);
        showToast("Tersalin!");
      };
      
      result.appendChild(card);
    });
  });
  feather.replace();
}

function showToast(m) {
    const t = document.createElement("div");
    t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2 rounded-full text-sm z-50 shadow-xl animate-bounce";
    t.innerText = m;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

input.oninput = generate;
search.oninput = generate;
copyAll.onclick = () => {
    const all = [...result.querySelectorAll('.text-xl')].map(e => e.innerText).join("\n\n");
    navigator.clipboard.writeText(all);
    showToast("Semua gaya disalin!");
};

toggleDark.onclick = () => {
    document.documentElement.classList.toggle('dark');
    toggleDark.innerText = document.documentElement.classList.contains('dark') ? "☀️" : "🌙";
};

// Start
generate();
</script>
</body>
</html>
