<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Universal Font Fiesta PRO</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            primary: '#6366f1', 
            success: '#22c55e'
          }
        }
      }
    }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.3s ease; 
        }

        /* Fallback Font untuk simbol Unicode agar tidak kotak-kotak */
        .font-render {
            font-family: 'Plus Jakarta Sans', "Segoe UI Symbol", "Apple Color Emoji", "Noto Sans Symbols", sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        .card-active:active { transform: scale(0.98); }
    </style>
</head>

<body class="bg-slate-50 dark:bg-gray-950 min-h-screen p-4 sm:p-6 font-render">

<div class="max-w-2xl mx-auto space-y-6">
    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2rem] shadow-xl shadow-indigo-500/5 border border-gray-100 dark:border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-800 tracking-tight flex items-center gap-3">
                <span class="bg-primary text-white p-2 rounded-2xl shadow-lg shadow-primary/30">
                    <i data-feather="zap" class="w-6 h-6"></i>
                </span>
                <span>FontFiesta <span class="text-primary text-sm font-bold bg-primary/10 px-2 py-1 rounded-lg ml-1">v3.0</span></span>
            </h1>
            <button id="toggleDark" class="p-3 rounded-2xl bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 transition-all active:rotate-12">🌙</button>
        </div>

        <div class="space-y-4">
            <div class="relative group">
                <textarea id="input" rows="3" 
                    class="w-full p-5 rounded-[1.5rem] bg-gray-50 dark:bg-gray-800/50 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-800 outline-none text-lg transition-all shadow-inner"
                    placeholder="Tulis pesan rahasiamu di sini..."></textarea>
                <div class="absolute right-4 bottom-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest pointer-events-none">Input Utama</div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i data-feather="search" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                    <input id="search" placeholder="Cari gaya (misal: Bold, Safe, Star)..."
                        class="w-full p-3.5 pl-12 rounded-2xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                </div>
                <button id="copyAll" class="bg-gray-900 dark:bg-primary hover:opacity-90 text-white font-bold px-8 py-3.5 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                    <i data-feather="copy" class="w-4 h-4"></i> Salin Semua
                </button>
            </div>
        </div>
    </div>

    <div id="result" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
        </div>

    <div class="text-center space-y-2">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-[0.3em]">GitHub Pages Optimized • UTF-8 Stable</p>
    </div>
</div>

<script>
feather.replace();

const input = document.getElementById("input");
const result = document.getElementById("result");
const search = document.getElementById("search");
const copyAll = document.getElementById("copyAll");
const toggleDark = document.getElementById("toggleDark");

// Database Gaya: Campuran Gaya Unicode (Fancy) dan Gaya ASCII (100% Aman)
const stylePresets = [
    // --- KATEGORI: 100% AMAN (ASCII) ---
    { name: "[SAFE] Classic Bold", group: "Safe", fn: t => t.toUpperCase() },
    { name: "[SAFE] Spaced Out", group: "Safe", fn: t => t.split('').join(' ') },
    { name: "[SAFE] Boxed", group: "Safe", fn: t => `[ ${t.toUpperCase()} ]` },
    { name: "[SAFE] Border", group: "Safe", fn: t => `--- ${t} ---` },
    { name: "[SAFE] Slashed", group: "Safe", fn: t => t.split('').join('/') },
    { name: "[SAFE] Arrow", group: "Safe", fn: t => `» ${t} «` },
    { name: "[SAFE] Loading", group: "Safe", fn: t => `[██ ${t} ██]` },

    // --- KATEGORI: FANCY (UNICODE) ---
    { 
        name: "Bold Serif", 
        group: "Fancy",
        fn: t => t.replace(/[a-zA-Z]/g, c => {
            const code = c.charCodeAt(0);
            return String.fromCodePoint(code <= 90 ? 0x1D400 + (code - 65) : 0x1D41A + (code - 97));
        })
    },
    { 
        name: "Mono Typewriter", 
        group: "Fancy",
        fn: t => t.replace(/[a-zA-Z]/g, c => {
            const code = c.charCodeAt(0);
            return String.fromCodePoint(code <= 90 ? 0x1D670 + (code - 65) : 0x1D68A + (code - 97));
        })
    },
    { 
        name: "Double Struck", 
        group: "Fancy",
        fn: t => t.replace(/[a-zA-Z]/g, c => {
            const code = c.charCodeAt(0);
            return String.fromCodePoint(code <= 90 ? 0x1D538 + (code - 65) : 0x1D552 + (code - 97));
        })
    },
    { 
        name: "Elegant Script", 
        group: "Fancy",
        fn: t => t.replace(/[a-zA-Z]/g, c => {
            const code = c.charCodeAt(0);
            return String.fromCodePoint(code <= 90 ? 0x1D49C + (code - 65) : 0x1D4B6 + (code - 97));
        })
    },
    { 
        name: "Circled", 
        group: "Fancy",
        fn: t => t.toUpperCase().replace(/[A-Z]/g, c => String.fromCodePoint(0x24B6 + (c.charCodeAt(0) - 65)))
    },
    { 
        name: "Squared Box", 
        group: "Fancy",
        fn: t => t.toUpperCase().replace(/[A-Z]/g, c => String.fromCodePoint(0x1F130 + (c.charCodeAt(0) - 65)))
    }
];

function render() {
    const val = input.value || "Ketik Sesuatu";
    const query = search.value.toLowerCase();
    result.innerHTML = "";

    stylePresets.filter(s => s.name.toLowerCase().includes(query)).forEach(style => {
        const styledText = style.fn(val);
        const isSafe = style.group === "Safe";
        
        const card = document.createElement("div");
        card.className = `card-active p-5 rounded-[1.5rem] bg-white dark:bg-gray-900 border ${isSafe ? 'border-success/30 bg-success/5' : 'border-gray-100 dark:border-gray-800'} cursor-pointer hover:shadow-lg transition-all group relative overflow-hidden`;
        
        card.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <span class="text-[10px] font-800 ${isSafe ? 'text-success' : 'text-primary'} uppercase tracking-wider">${style.name}</span>
                ${isSafe ? '<span class="text-[9px] bg-success/20 text-success px-1.5 py-0.5 rounded italic">100% Aman</span>' : ''}
            </div>
            <div class="text-xl break-words dark:text-white leading-tight font-medium pr-6">${styledText}</div>
            <div class="absolute right-4 bottom-4 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0">
                <i data-feather="copy" class="w-4 h-4 text-primary"></i>
            </div>
        `;

        card.onclick = () => {
            navigator.clipboard.writeText(styledText);
            showToast("Teks disalin!");
        };

        result.appendChild(card);
    });
    feather.replace();
}

function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-2xl z-50 animate-bounce border border-white/10";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1500);
}

input.addEventListener("input", render);
search.addEventListener("input", render);

copyAll.onclick = () => {
    const all = [...result.querySelectorAll('.text-xl')].map(el => el.innerText).join("\n\n");
    navigator.clipboard.writeText(all);
    showToast("Semua gaya disalin!");
};

toggleDark.onclick = () => {
    document.documentElement.classList.toggle("dark");
    toggleDark.innerText = document.documentElement.classList.contains("dark") ? "☀️" : "🌙";
};

// Start
render();
</script>
</body>
</html>
